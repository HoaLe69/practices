# A minimal reverse proxy.
# Requests hit Nginx on port 80, which forwards them to the `backend` service.

server {
    listen 80;
    server_name localhost;

    location / {
        # "backend" is the service name from docker-compose.yml.
        # Docker's internal DNS resolves it to the container's IP.
        proxy_pass http://backend:80;

        # Forward useful info about the original request to the backend.
        # Without these, the backend only sees Nginx as the client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # A dedicated health endpoint served by Nginx itself (not proxied).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

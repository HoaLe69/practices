# A minimal reverse proxy.
# Requests hit Nginx on port 80, which forwards them to the `backend` service.

# define the group server pool
upstream backend_servers {
    server backend-1:3000;
    server backend-2:8080;
}

server {
    listen 80;
    server_name localhost;

    # Define the root directory where static files are located
    root /usr/share/nginx;

    location / {
        access_log on;
        # "backend" is the service name from docker-compose.yml.
        # Docker's internal DNS resolves it to the container's IP.
        proxy_pass http://backend_servers;

        # Forward useful info about the original request to the backend.
        # Without these, the backend only sees Nginx as the client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Serve static files directly from disk (no proxying).
    # ./assets is mounted to /usr/share/nginx/media in docker-compose.yml.
    # `alias` maps the URL prefix onto that dir, so:
    #   GET /media/image1.png  ->  /usr/share/nginx/media/image1.png
    # (inheriting `root` here would append the full URI: /media/media/...).
    location /media/ {
        access_log on;
        # using alias for a clean /media/ prefix (using root)
        # alias /usr/share/nginx/media/;

        # Serve the file if it exists, otherwise 404 instead of falling through.
        try_files $uri =404;

        #cache
        expires 7d;
        add_header Cache-Control "public";
    }

    location /todo {
        access_log on;

        proxy_pass http://backend-3:5000;
        
        # Forward useful info about the original request to the backend.
        # Without these, the backend only sees Nginx as the client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /coasters  {
        access_log on;
        proxy_pass http://backend-2:8080;


        # Forward useful info about the original request to the backend.
        # Without these, the backend only sees Nginx as the client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # A dedicated health endpoint served by Nginx itself (not proxied).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
